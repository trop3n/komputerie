<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boids</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="tool-layout" id="app">
    <aside class="tool-sidebar">
      <a href="../../" class="back-link">&larr; Tools</a>
      <h1>Boids</h1>
      <div id="source-controls"></div>
      <div class="control-group">
        <label>Source Influence</label>
        <div class="range-row">
          <input type="range" id="source-influence" min="0" max="3" value="0" step="0.1">
          <span class="range-value" data-for="source-influence">0</span>
        </div>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Count</label>
        <div class="range-row">
          <input type="range" id="count" min="10" max="500" value="150" step="10">
          <span class="range-value" data-for="count">150</span>
        </div>
      </div>
      <div class="control-group">
        <label>Boundary</label>
        <div class="radio-row" id="boundary-radios">
          <input type="radio" name="boundary" id="bnd-wrap" value="wrap" checked>
          <label for="bnd-wrap">Wrap</label>
          <input type="radio" name="boundary" id="bnd-bounce" value="bounce">
          <label for="bnd-bounce">Bounce</label>
          <input type="radio" name="boundary" id="bnd-avoid" value="avoid">
          <label for="bnd-avoid">Avoid</label>
        </div>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Separation Radius</label>
        <div class="range-row">
          <input type="range" id="sep-r" min="5" max="100" value="28">
          <span class="range-value" data-for="sep-r">28</span>
        </div>
      </div>
      <div class="control-group">
        <label>Separation Weight</label>
        <div class="range-row">
          <input type="range" id="sep-w" min="0" max="5" value="1.5" step="0.1">
          <span class="range-value" data-for="sep-w">1.5</span>
        </div>
      </div>
      <div class="control-group">
        <label>Alignment Radius</label>
        <div class="range-row">
          <input type="range" id="align-r" min="5" max="150" value="50">
          <span class="range-value" data-for="align-r">50</span>
        </div>
      </div>
      <div class="control-group">
        <label>Alignment Weight</label>
        <div class="range-row">
          <input type="range" id="align-w" min="0" max="5" value="1.0" step="0.1">
          <span class="range-value" data-for="align-w">1.0</span>
        </div>
      </div>
      <div class="control-group">
        <label>Cohesion Radius</label>
        <div class="range-row">
          <input type="range" id="coh-r" min="5" max="150" value="50">
          <span class="range-value" data-for="coh-r">50</span>
        </div>
      </div>
      <div class="control-group">
        <label>Cohesion Weight</label>
        <div class="range-row">
          <input type="range" id="coh-w" min="0" max="5" value="1.0" step="0.1">
          <span class="range-value" data-for="coh-w">1.0</span>
        </div>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Max Speed</label>
        <div class="range-row">
          <input type="range" id="max-speed" min="0.5" max="12" value="4" step="0.5">
          <span class="range-value" data-for="max-speed">4</span>
        </div>
      </div>
      <div class="control-group">
        <label>Min Speed</label>
        <div class="range-row">
          <input type="range" id="min-speed" min="0" max="5" value="0.5" step="0.1">
          <span class="range-value" data-for="min-speed">0.5</span>
        </div>
      </div>
      <div class="control-group">
        <label>Max Force</label>
        <div class="range-row">
          <input type="range" id="max-force" min="0.01" max="0.8" value="0.15" step="0.01">
          <span class="range-value" data-for="max-force">0.15</span>
        </div>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Shape</label>
        <div class="radio-row" id="shape-radios">
          <input type="radio" name="shape" id="sh-triangle" value="triangle" checked>
          <label for="sh-triangle">Triangle</label>
          <input type="radio" name="shape" id="sh-circle" value="circle">
          <label for="sh-circle">Circle</label>
          <input type="radio" name="shape" id="sh-line" value="line">
          <label for="sh-line">Line</label>
        </div>
      </div>
      <div class="control-group">
        <label>Size</label>
        <div class="range-row">
          <input type="range" id="boid-size" min="2" max="30" value="8">
          <span class="range-value" data-for="boid-size">8</span>
        </div>
      </div>
      <div class="control-group">
        <label>Trail</label>
        <div class="range-row">
          <input type="range" id="trail" min="1" max="255" value="20">
          <span class="range-value" data-for="trail">20</span>
        </div>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Color Mode</label>
        <div class="radio-row" id="color-mode-radios">
          <input type="radio" name="color-mode" id="cm-velocity" value="velocity" checked>
          <label for="cm-velocity">Vel</label>
          <input type="radio" name="color-mode" id="cm-heading" value="heading">
          <label for="cm-heading">Dir</label>
          <input type="radio" name="color-mode" id="cm-palette" value="palette">
          <label for="cm-palette">Idx</label>
          <input type="radio" name="color-mode" id="cm-uniform" value="uniform">
          <label for="cm-uniform">Uni</label>
        </div>
      </div>
      <div class="control-group" id="uniform-color-group" style="display:none">
        <label>Color</label>
        <input type="color" id="uniform-color" value="#4a9eff" style="width:100%;height:28px;border:1px solid var(--border);background:var(--surface-2);cursor:pointer">
      </div>
      <div id="hsl-controls">
        <div class="control-group">
          <label>Hue Start</label>
          <div class="range-row">
            <input type="range" id="hue-start" min="0" max="360" value="200" step="5">
            <span class="range-value" data-for="hue-start">200</span>
          </div>
        </div>
        <div class="control-group">
          <label>Hue Range</label>
          <div class="range-row">
            <input type="range" id="hue-range" min="0" max="360" value="140" step="5">
            <span class="range-value" data-for="hue-range">140</span>
          </div>
        </div>
        <div class="control-group">
          <label>Saturation</label>
          <div class="range-row">
            <input type="range" id="saturation" min="0" max="100" value="85" step="5">
            <span class="range-value" data-for="saturation">85</span>
          </div>
        </div>
        <div class="control-group">
          <label>Lightness</label>
          <div class="range-row">
            <input type="range" id="lightness" min="0" max="100" value="65" step="5">
            <span class="range-value" data-for="lightness">65</span>
          </div>
        </div>
      </div>
      <div class="control-group">
        <label>Opacity</label>
        <div class="range-row">
          <input type="range" id="opacity" min="10" max="100" value="100" step="5">
          <span class="range-value" data-for="opacity">100</span>
        </div>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Background</label>
        <input type="color" id="background" value="#050505" style="width:100%;height:28px;border:1px solid var(--border);background:var(--surface-2);cursor:pointer">
      </div>
      <hr class="separator">
      <div class="btn-row">
        <button class="btn" id="btn-scatter">Scatter</button>
      </div>
      <hr class="separator">
      <div class="btn-row">
        <button class="btn" id="btn-fullscreen">Fullscreen</button>
        <button class="btn" id="btn-save">Save PNG</button>
      </div>
    </aside>
    <div class="tool-canvas-area">
      <canvas id="canvas"></canvas>
      <button class="fullscreen-exit" id="btn-exit-fs">Exit Fullscreen &middot; Esc</button>
    </div>
  </div>
  <script type="module" src="boids.js"></script>
</body>
</html>
