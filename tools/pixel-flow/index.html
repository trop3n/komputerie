<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Flow</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="tool-layout" id="app">
    <aside class="tool-sidebar">
      <a href="../../" class="back-link">&larr; Tools</a>
      <h1>Pixel Flow</h1>
      <div id="source-controls"></div>
      <hr class="separator">
      <div class="control-group">
        <label>Flow Mode</label>
        <select id="flow-mode">
          <option value="luminance">Luminance Displacement</option>
          <option value="edge">Edge Flow</option>
          <option value="wind">Wind</option>
          <option value="gravity">Gravity</option>
          <option value="spiral">Spiral</option>
          <option value="explode">Explode</option>
        </select>
      </div>
      <div class="control-group">
        <label>Particle Count</label>
        <select id="particle-count">
          <option value="5000">5,000</option>
          <option value="15000" selected>15,000</option>
          <option value="30000">30,000</option>
          <option value="60000">60,000</option>
        </select>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Speed</label>
        <div class="range-row">
          <input type="range" id="speed" min="0.1" max="5" value="1" step="0.1">
          <span class="range-value" data-for="speed">1</span>
        </div>
      </div>
      <div class="control-group">
        <label>Particle Size</label>
        <div class="range-row">
          <input type="range" id="particle-size" min="1" max="6" value="1" step="0.5">
          <span class="range-value" data-for="particle-size">1</span>
        </div>
      </div>
      <div class="control-group">
        <label>Trail Length</label>
        <div class="range-row">
          <input type="range" id="trail" min="0" max="100" value="85">
          <span class="range-value" data-for="trail">85</span>
        </div>
      </div>
      <div class="control-group">
        <label>Turbulence</label>
        <div class="range-row">
          <input type="range" id="turbulence" min="0" max="100" value="20">
          <span class="range-value" data-for="turbulence">20</span>
        </div>
      </div>
      <hr class="separator">
      <div class="control-group">
        <label>Color Mode</label>
        <select id="color-mode">
          <option value="source">Source Image</option>
          <option value="velocity">Velocity</option>
          <option value="white">White</option>
          <option value="rainbow">Rainbow</option>
        </select>
      </div>
      <hr class="separator">
      <div class="btn-row">
        <button class="btn" id="btn-reset">Reset</button>
        <button class="btn" id="btn-pause">Pause</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-fullscreen">Fullscreen</button>
        <button class="btn" id="btn-save">Save PNG</button>
      </div>
    </aside>
    <div class="tool-canvas-area">
      <canvas id="canvas"></canvas>
      <button class="fullscreen-exit" id="btn-exit-fs">Exit Fullscreen &middot; Esc</button>
    </div>
  </div>
  <script type="module" src="pixel-flow.js"></script>
</body>
</html>
